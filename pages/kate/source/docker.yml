snippets:

  - trigger: compose
    description: Docker Compose
    body: |
      services:
        ${1:app}:
          image: ${2:image}
          container_name: ${1:app}
          restart: unless-stopped

  - trigger: volume
    description: Docker Volume
    body: |
      volumes:
        - ${1:source}:${2:target}

  - trigger: ports
    description: Docker Ports
    body: |
      ports:
        - "${1:8080}:80"

  - trigger: env
    description: Environment
    body: |
      environment:
        TZ: Europe/Berlin

  - trigger: health
    description: Healthcheck
    body: |
      healthcheck:
        test: ["CMD", "${1:true}"]
        interval: 30s
        timeout: 10s
        retries: 3

  - trigger: network
    description: Docker Network
    body: |
      networks:
        default:
          name: ${1:network}
